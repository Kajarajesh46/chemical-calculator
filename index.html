<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chemical Utility Calculator</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: {
                            50: '#f8fafc',
                            100: '#f1f5f9',
                            200: '#e2e8f0',
                            300: '#cbd5e1',
                            400: '#94a3b8',
                            500: '#64748b',
                            600: '#475569',
                            700: '#334155',
                            800: '#1e293b',
                            900: '#0f172a',
                            950: '#020617',
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body { 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif; 
            -webkit-font-smoothing: antialiased; 
            -moz-osx-font-smoothing: grayscale; 
        }
        .animate-in { animation: animate-in 0.5s ease-out; }
        .fade-in { animation-name: fadeIn; }
        .slide-in-from-bottom-4 { animation-name: slideInFromBottom; }
        .slide-in-from-right-8 { animation-name: slideInFromRight; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideInFromBottom { from { transform: translateY(1rem); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideInFromRight { from { transform: translateX(2rem); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body class="bg-slate-100 dark:bg-slate-950">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icons = {
          Beaker: (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
              <path d="M4.5 3h15"/><path d="M6 3v16a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V3"/><path d="M6 14h12"/>
            </svg>
          ),
          Bag: (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
              <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/>
            </svg>
          ),
          Cylinder: (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
              <rect x="6" y="8" width="12" height="14" rx="3"/><path d="M8 8V6a4 4 0 0 1 8 0v2"/><path d="M10 2h4"/>
            </svg>
          ),
          Moon: (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
              <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
            </svg>
          ),
          Sun: (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
              <circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>
            </svg>
          ),
          ArrowLeft: (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
              <path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>
            </svg>
          ),
          Copy: (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
              <rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>
            </svg>
          ),
          Trash: (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
              <path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>
            </svg>
          ),
          Check: (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          )
        };

        const CALCULATORS = [
          {
            id: 'solution',
            title: 'Solution Quantity',
            description: 'Calculate net solution based on concentration',
            icon: Icons.Beaker,
            themeColor: 'from-blue-500 to-blue-600',
            inputs: [
              { id: 'netQty', label: 'Net Quantity', unit: 'MT', placeholder: 'e.g. 34.56' },
              { id: 'conc', label: 'Concentration', unit: '%', placeholder: 'e.g. 48.56' }
            ],
            calc: (vals) => {
              if (vals.netQty > 0 && vals.conc > 0) return vals.netQty * (vals.conc / 100);
              return null;
            },
            format: (val) => val.toFixed(3),
            resultUnit: 'MT',
            formulaText: 'Quantity = Net Quantity × (Concentration ÷ 100)'
          },
          {
            id: 'caustic',
            title: 'Caustic Soda Flakes',
            description: 'Convert metric tons to 50kg bags',
            icon: Icons.Bag,
            themeColor: 'from-emerald-500 to-emerald-600',
            inputs: [
              { id: 'qty', label: 'Quantity', unit: 'MT', placeholder: 'e.g. 50' }
            ],
            calc: (vals) => {
              if (vals.qty > 0) return (vals.qty * 1000) / 50;
              return null;
            },
            format: (val) => Math.ceil(val).toString(),
            resultUnit: 'Bags',
            formulaText: 'Total Bags = (Quantity × 1000) ÷ 50'
          },
          {
            id: 'hydrogen',
            title: 'Hydrogen Gas Cylinders',
            description: '1 Cylinder = 6.5 NM³ (Mode A)',
            icon: Icons.Cylinder,
            themeColor: 'from-cyan-500 to-cyan-600',
            inputs: [
              { id: 'cylinders', label: 'Number of Cylinders', unit: 'Count', placeholder: 'e.g. 20' }
            ],
            calc: (vals) => {
              if (vals.cylinders > 0) return vals.cylinders * 6.5;
              return null;
            },
            format: (val) => parseFloat(val.toFixed(3)).toString(),
            resultUnit: 'NM³',
            formulaText: 'Total Gas = Cylinders × 6.5 NM³'
          },
          {
            id: 'chlorine',
            title: 'Chlorine Cylinders',
            description: '1 Cylinder = 0.9 MT (Mode A)',
            icon: Icons.Cylinder,
            themeColor: 'from-amber-500 to-amber-600',
            inputs: [
              { id: 'cylinders', label: 'Number of Cylinders', unit: 'Count', placeholder: 'e.g. 25' }
            ],
            calc: (vals) => {
              if (vals.cylinders > 0) return vals.cylinders * 0.9;
              return null;
            },
            format: (val) => parseFloat(val.toFixed(3)).toString(),
            resultUnit: 'MT',
            formulaText: 'Quantity = Cylinders × 0.9 MT'
          },
          {
            id: 'methyl',
            title: 'Methyl Chloride Cylinders',
            description: '1 Cylinder = 0.6 MT (Mode A)',
            icon: Icons.Cylinder,
            themeColor: 'from-teal-500 to-teal-600',
            inputs: [
              { id: 'cylinders', label: 'Number of Cylinders', unit: 'Count', placeholder: 'e.g. 30' }
            ],
            calc: (vals) => {
              if (vals.cylinders > 0) return vals.cylinders * 0.6;
              return null;
            },
            format: (val) => parseFloat(val.toFixed(3)).toString(),
            resultUnit: 'MT',
            formulaText: 'Quantity = Cylinders × 0.6 MT'
          }
        ];

        function App() {
          const [darkMode, setDarkMode] = useState(false);
          const [activeCalcId, setActiveCalcId] = useState(null);
          const [inputValues, setInputValues] = useState({});
          const [copied, setCopied] = useState(false);

          useEffect(() => {
            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
              setDarkMode(true);
            }
          }, []);

          // Apply dark mode class to root HTML element for Tailwind
          useEffect(() => {
              if (darkMode) {
                  document.documentElement.classList.add('dark');
              } else {
                  document.documentElement.classList.remove('dark');
              }
          }, [darkMode]);

          const activeCalc = useMemo(() => 
            CALCULATORS.find(c => c.id === activeCalcId), 
          [activeCalcId]);

          const handleInputChange = (id, value) => {
            const numValue = value === '' ? '' : parseFloat(value);
            setInputValues(prev => ({
              ...prev,
              [id]: isNaN(numValue) ? '' : numValue
            }));
          };

          const clearInputs = () => {
            setInputValues({});
            setCopied(false);
          };

          const navigateHome = () => {
            setActiveCalcId(null);
            clearInputs();
          };

          const currentResult = useMemo(() => {
            if (!activeCalc) return null;
            
            const allInputsFilled = activeCalc.inputs.every(input => 
              typeof inputValues[input.id] === 'number' && !isNaN(inputValues[input.id])
            );

            if (!allInputsFilled) return null;

            const rawResult = activeCalc.calc(inputValues);
            return rawResult !== null ? activeCalc.format(rawResult) : null;
          }, [activeCalc, inputValues]);

          const handleCopy = async () => {
            if (!currentResult) return;
            const textToCopy = `${currentResult} ${activeCalc.resultUnit}`;
            
            try {
              if (navigator.clipboard && window.isSecureContext) {
                await navigator.clipboard.writeText(textToCopy);
              } else {
                const textArea = document.createElement("textarea");
                textArea.value = textToCopy;
                textArea.style.position = "fixed";
                textArea.style.left = "-999999px";
                textArea.style.top = "-999999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                document.execCommand('copy');
                textArea.remove();
              }
              setCopied(true);
              setTimeout(() => setCopied(false), 2000);
            } catch (error) {
              console.error("Failed to copy:", error);
            }
          };

          const renderHomeView = () => (
            <div className="p-4 sm:p-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
              <div className="mb-6">
                <h2 className="text-2xl font-bold text-slate-800 dark:text-white mb-2">Select Calculator</h2>
                <p className="text-slate-500 dark:text-slate-400">Quick industrial calculations on the go.</p>
              </div>
              
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                {CALCULATORS.map((calc) => {
                  const Icon = calc.icon;
                  return (
                    <button
                      key={calc.id}
                      onClick={() => setActiveCalcId(calc.id)}
                      className="group relative overflow-hidden bg-white dark:bg-slate-800 rounded-2xl p-5 shadow-sm hover:shadow-md transition-all duration-300 border border-slate-100 dark:border-slate-700/50 text-left flex flex-col active:scale-[0.98]"
                    >
                      <div className={`w-12 h-12 rounded-xl bg-gradient-to-br ${calc.themeColor} flex items-center justify-center text-white mb-4 shadow-sm group-hover:scale-110 transition-transform duration-300`}>
                        <Icon size={24} />
                      </div>
                      <h3 className="text-lg font-semibold text-slate-800 dark:text-slate-100 mb-1">{calc.title}</h3>
                      <p className="text-sm text-slate-500 dark:text-slate-400 font-medium">{calc.description}</p>
                    </button>
                  );
                })}
              </div>
            </div>
          );

          const renderCalculatorView = () => {
            if (!activeCalc) return null;
            const Icon = activeCalc.icon;

            return (
              <div className="p-4 sm:p-6 animate-in slide-in-from-right-8 duration-300">
                <div className="flex items-center mb-8">
                  <div className={`w-14 h-14 rounded-2xl bg-gradient-to-br ${activeCalc.themeColor} flex items-center justify-center text-white shadow-md mr-4`}>
                    <Icon size={28} />
                  </div>
                  <div>
                    <h2 className="text-2xl font-bold text-slate-800 dark:text-white leading-tight">{activeCalc.title}</h2>
                    <p className="text-sm text-slate-500 dark:text-slate-400 mt-1">{activeCalc.formulaText}</p>
                  </div>
                </div>

                <div className="space-y-5 bg-white dark:bg-slate-800 p-5 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700/50">
                  {activeCalc.inputs.map((input) => (
                    <div key={input.id}>
                      <label className="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">
                        {input.label} <span className="text-slate-400 font-normal">({input.unit})</span>
                      </label>
                      <div className="relative">
                        <input
                          type="number"
                          min="0"
                          step="any"
                          value={inputValues[input.id] ?? ''}
                          onChange={(e) => handleInputChange(input.id, e.target.value)}
                          placeholder={input.placeholder}
                          className="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white rounded-xl px-4 py-3.5 outline-none focus:ring-2 focus:ring-blue-500 dark:focus:ring-blue-400 focus:border-transparent transition-all text-lg font-medium"
                        />
                      </div>
                    </div>
                  ))}
                </div>

                <div className="mt-6 bg-slate-900 dark:bg-slate-950 rounded-2xl p-6 shadow-lg relative overflow-hidden text-center border border-slate-800">
                  <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-emerald-400 to-blue-500"></div>
                  <p className="text-slate-400 text-sm font-semibold uppercase tracking-wider mb-2">Calculation Result</p>
                  
                  <div className="flex items-baseline justify-center space-x-2">
                    <span className="text-4xl sm:text-5xl font-extrabold text-white tracking-tight break-all">
                      {currentResult !== null ? currentResult : '0.000'}
                    </span>
                    <span className="text-xl text-emerald-400 font-semibold">
                      {activeCalc.resultUnit}
                    </span>
                  </div>
                </div>

                <div className="grid grid-cols-2 gap-4 mt-6">
                  <button
                    onClick={clearInputs}
                    className="flex items-center justify-center space-x-2 bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 font-semibold py-3.5 px-4 rounded-xl transition-colors active:scale-95"
                  >
                    <Icons.Trash size={18} />
                    <span>Clear</span>
                  </button>
                  
                  <button
                    onClick={handleCopy}
                    disabled={currentResult === null}
                    className={`flex items-center justify-center space-x-2 font-semibold py-3.5 px-4 rounded-xl transition-all active:scale-95 ${
                      currentResult === null 
                        ? 'bg-slate-100 dark:bg-slate-800 text-slate-400 cursor-not-allowed'
                        : copied
                          ? 'bg-emerald-500 hover:bg-emerald-600 text-white shadow-md shadow-emerald-500/20'
                          : 'bg-blue-600 hover:bg-blue-700 text-white shadow-md shadow-blue-600/20'
                    }`}
                  >
                    {copied ? <Icons.Check size={18} /> : <Icons.Copy size={18} />}
                    <span>{copied ? 'Copied!' : 'Copy Result'}</span>
                  </button>
                </div>
              </div>
            );
          };

          return (
            <div className="min-h-screen bg-slate-100 dark:bg-slate-950 transition-colors duration-300 font-sans">
              <div className="max-w-md mx-auto min-h-screen bg-slate-50 dark:bg-slate-900 shadow-2xl relative flex flex-col">
                
                <header className="sticky top-0 z-10 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 px-4 h-16 flex items-center justify-between">
                  <div className="flex items-center">
                    {activeCalcId ? (
                      <button 
                        onClick={navigateHome}
                        className="p-2 -ml-2 mr-2 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors"
                        aria-label="Back to home"
                      >
                        <Icons.ArrowLeft size={24} />
                      </button>
                    ) : (
                      <div className="w-8 h-8 rounded bg-gradient-to-br from-blue-600 to-emerald-500 flex items-center justify-center text-white mr-3 shadow-sm">
                        <Icons.Beaker size={18} />
                      </div>
                    )}
                    <h1 className="text-lg font-bold text-slate-800 dark:text-white truncate">
                      {activeCalcId ? 'Calculator' : 'ChemUtil'}
                    </h1>
                  </div>

                  <button
                    onClick={() => setDarkMode(!darkMode)}
                    className="p-2 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors"
                    aria-label="Toggle Dark Mode"
                  >
                    {darkMode ? <Icons.Sun size={22} /> : <Icons.Moon size={22} />}
                  </button>
                </header>

                <main className="flex-1 overflow-y-auto pb-8">
                  {activeCalcId ? renderCalculatorView() : renderHomeView()}
                </main>

              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
